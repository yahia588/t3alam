<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعلّم الإيطالية</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F7EDD8;
    --sand-dark: #ECD9B0;
    --teal: #1B5E5A;
    --teal-light: #2A7A74;
    --teal-pale: #E8F4F3;
    --gold: #C4883A;
    --text: #2C2416;
    --text-muted: #7A6A52;
    --white: #FFFDF7;
    --shadow: 0 4px 24px rgba(27,94,90,0.12);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Naskh Arabic',serif; background:var(--sand); color:var(--text); min-height:100vh; direction:rtl; }

  .screen { display:none; min-height:100vh; flex-direction:column; }
  .screen.active { display:flex; }

  /* ── HOME ── */
  #home { background:var(--sand); position:relative; overflow:hidden; }
  .hero-bg { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .hero-bg::before { content:''; position:absolute; top:-80px; right:-80px; width:400px; height:400px; background:radial-gradient(circle,rgba(196,136,58,.18) 0%,transparent 70%); border-radius:50%; }
  .hero-bg::after  { content:''; position:absolute; bottom:-100px; left:-100px; width:500px; height:500px; background:radial-gradient(circle,rgba(27,94,90,.12) 0%,transparent 70%); border-radius:50%; }

  .hero { padding:44px 24px 28px; text-align:center; position:relative; z-index:1; }
  .logo-mark { display:inline-flex; align-items:center; gap:10px; background:var(--teal); color:var(--white); padding:8px 20px; border-radius:40px; font-size:13px; font-weight:600; margin-bottom:24px; box-shadow:0 4px 16px rgba(27,94,90,.3); }
  .hero h1 { font-size:36px; font-weight:700; color:var(--teal); line-height:1.2; margin-bottom:8px; }
  .hero h1 span { font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--gold); }
  .hero p { font-size:15px; color:var(--text-muted); line-height:1.7; max-width:320px; margin:0 auto 24px; }

  .stats-row { display:flex; justify-content:center; gap:28px; margin-bottom:32px; }
  .stat { text-align:center; }
  .stat-num { font-size:22px; font-weight:700; color:var(--teal); }
  .stat-label { font-size:12px; color:var(--text-muted); }

  .search-wrap { padding:0 24px 16px; position:relative; z-index:1; }
  .search-input { width:100%; background:var(--white); border:1.5px solid var(--sand-dark); border-radius:40px; padding:12px 20px 12px 44px; font-family:'Noto Naskh Arabic',serif; font-size:15px; color:var(--text); outline:none; direction:rtl; transition:border-color .2s; }
  .search-input:focus { border-color:var(--teal); }
  .search-icon { position:absolute; left:40px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }

  .categories { display:flex; gap:8px; padding:0 24px 16px; overflow-x:auto; position:relative; z-index:1; scrollbar-width:none; }
  .categories::-webkit-scrollbar { display:none; }
  .cat-btn { flex-shrink:0; background:var(--white); border:1.5px solid var(--sand-dark); border-radius:20px; padding:6px 16px; font-family:'Noto Naskh Arabic',serif; font-size:13px; color:var(--text-muted); cursor:pointer; transition:all .15s; white-space:nowrap; }
  .cat-btn.active, .cat-btn:hover { background:var(--teal); border-color:var(--teal); color:white; }

  .section-title { padding:0 24px 14px; font-size:17px; font-weight:700; color:var(--text); position:relative; z-index:1; }
  .section-title::after { content:''; display:block; width:32px; height:3px; background:var(--gold); border-radius:2px; margin-top:5px; }

  .progress-wrap { padding:0 24px 8px; position:relative; z-index:1; }
  .progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); margin-bottom:6px; }
  .progress-bar { height:6px; background:var(--sand-dark); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--teal),var(--teal-light)); border-radius:3px; transition:width .4s ease; }

  .lessons-grid { display:flex; flex-direction:column; gap:10px; padding:0 24px 32px; position:relative; z-index:1; }
  .lesson-card { background:var(--white); border-radius:var(--radius); padding:16px 18px; display:flex; align-items:center; gap:14px; cursor:pointer; box-shadow:var(--shadow); border:1.5px solid transparent; transition:all .2s ease; position:relative; overflow:hidden; }
  .lesson-card::before { content:''; position:absolute; right:0; top:0; bottom:0; width:4px; background:var(--teal); border-radius:0 var(--radius) var(--radius) 0; opacity:0; transition:opacity .2s; }
  .lesson-card:hover { border-color:var(--teal-light); transform:translateY(-2px); box-shadow:0 8px 32px rgba(27,94,90,.18); }
  .lesson-card:hover::before { opacity:1; }

  .lesson-icon { width:50px; height:50px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .lesson-info { flex:1; min-width:0; }
  .lesson-title-ar { font-size:15px; font-weight:700; color:var(--text); margin-bottom:2px; }
  .lesson-title-it { font-family:'Cormorant Garamond',serif; font-size:13px; color:var(--gold); font-style:italic; margin-bottom:3px; }
  .lesson-desc { font-size:12px; color:var(--text-muted); line-height:1.5; }
  .lesson-badge { display:inline-block; background:var(--teal-pale); color:var(--teal); font-size:10px; padding:2px 8px; border-radius:10px; margin-top:4px; font-weight:600; }
  .lesson-arrow { color:var(--teal); font-size:16px; flex-shrink:0; opacity:.4; transition:all .2s; }
  .lesson-card:hover .lesson-arrow { opacity:1; transform:translateX(-4px); }

  /* ── LESSON ── */
  #lesson { background:var(--white); }
  .lesson-header { background:var(--teal); padding:20px 24px 32px; position:relative; overflow:hidden; }
  .lesson-header::after { content:''; position:absolute; bottom:-20px; left:0; right:0; height:40px; background:var(--white); border-radius:40px 40px 0 0; }
  .back-btn { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,.8); font-size:14px; cursor:pointer; margin-bottom:14px; background:none; border:none; font-family:inherit; padding:0; }
  .back-btn:hover { color:white; }
  .lesson-header-icon { font-size:34px; margin-bottom:6px; }
  .lesson-header h2 { font-size:22px; font-weight:700; color:white; margin-bottom:3px; }
  .lesson-header .subtitle { font-family:'Cormorant Garamond',serif; font-style:italic; color:rgba(255,255,255,.7); font-size:15px; }

  .chat-container { flex:1; overflow-y:auto; padding:20px 18px 12px; display:flex; flex-direction:column; gap:14px; }
  .msg { display:flex; gap:10px; animation:fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg-ai { align-items:flex-start; }
  .msg-user { align-items:flex-start; flex-direction:row-reverse; }
  .msg-avatar { width:34px; height:34px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .msg-ai .msg-avatar { background:var(--teal); }
  .msg-user .msg-avatar { background:var(--gold); }
  .msg-bubble { max-width:83%; border-radius:20px; padding:13px 15px; font-size:15px; line-height:1.75; }
  .msg-ai .msg-bubble { background:var(--teal-pale); border:1px solid rgba(27,94,90,.1); border-top-right-radius:4px; color:var(--text); }
  .msg-user .msg-bubble { background:var(--teal); color:white; border-top-left-radius:4px; }
  .it-word { display:inline-block; background:var(--gold); color:white; padding:1px 8px; border-radius:6px; font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:600; margin:0 2px; }

  .typing-indicator { display:flex; align-items:center; gap:5px; padding:13px 15px; background:var(--teal-pale); border-radius:20px; border-top-right-radius:4px; border:1px solid rgba(27,94,90,.1); width:fit-content; }
  .dot { width:7px; height:7px; background:var(--teal); border-radius:50%; animation:bounce 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-6px);opacity:1} }

  .quick-questions { padding:0 18px 10px; display:flex; flex-wrap:wrap; gap:7px; justify-content:flex-end; }
  .quick-btn { background:var(--sand); border:1.5px solid var(--sand-dark); border-radius:20px; padding:6px 13px; font-family:'Noto Naskh Arabic',serif; font-size:13px; color:var(--text); cursor:pointer; transition:all .15s; }
  .quick-btn:hover { background:var(--teal); border-color:var(--teal); color:white; }

  .input-bar { padding:10px 14px 18px; display:flex; gap:10px; background:var(--white); border-top:1px solid var(--sand-dark); }
  .input-field { flex:1; background:var(--sand); border:1.5px solid var(--sand-dark); border-radius:24px; padding:11px 17px; font-family:'Noto Naskh Arabic',serif; font-size:15px; color:var(--text); outline:none; direction:rtl; resize:none; transition:border-color .2s; }
  .input-field:focus { border-color:var(--teal); background:var(--white); }
  .input-field::placeholder { color:var(--text-muted); }
  .send-btn { width:46px; height:46px; border-radius:50%; background:var(--teal); border:none; color:white; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; box-shadow:0 4px 12px rgba(27,94,90,.35); }
  .send-btn:hover{background:var(--teal-light)} .send-btn:active{transform:scale(.95)} .send-btn:disabled{opacity:.5;cursor:not-allowed}
  .chat-container::-webkit-scrollbar{width:4px} .chat-container::-webkit-scrollbar-thumb{background:var(--sand-dark);border-radius:2px}
  .error-msg { background:#FEE2E2; border:1px solid #FCA5A5; border-radius:12px; padding:12px 16px; font-size:14px; color:#991B1B; text-align:center; }
</style>
</head>
<body>

<!-- ════ HOME ════ -->
<div id="home" class="screen active">
  <div class="hero-bg"></div>
  <div class="hero">
    <div class="logo-mark"><span>🇮🇹</span> Ta3allam l'Italiana</div>
    <h1>تعلّم <span>الإيطالية</span><br>بالعربية</h1>
    <p>معلّم ذكي يشرح لك الإيطالية بالعربية، بأمثلة من حياتك الحقيقية في إيطاليا</p>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">١٣</div><div class="stat-label">درساً</div></div>
      <div class="stat"><div class="stat-num">٢٤/٧</div><div class="stat-label">متاح دائماً</div></div>
      <div class="stat"><div class="stat-num">🤖</div><div class="stat-label">ذكاء اصطناعي</div></div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label"><span>تقدّمك</span><span id="progressText">0 / 13 درس</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="search-wrap">
    <input class="search-input" placeholder="ابحث عن درس..." oninput="filterLessons(this.value)" />
    <span class="search-icon">🔍</span>
  </div>

  <div class="categories">
    <button class="cat-btn active" onclick="filterCategory('all',this)">الكل</button>
    <button class="cat-btn" onclick="filterCategory('basics',this)">الأساسيات</button>
    <button class="cat-btn" onclick="filterCategory('life',this)">الحياة اليومية</button>
    <button class="cat-btn" onclick="filterCategory('official',this)">الرسمي</button>
    <button class="cat-btn" onclick="filterCategory('emergency',this)">طوارئ</button>
  </div>

  <div class="section-title">اختر درسك</div>
  <div class="lessons-grid" id="lessonsGrid"></div>
</div>

<!-- ════ LESSON ════ -->
<div id="lesson" class="screen">
  <div class="lesson-header">
    <button class="back-btn" onclick="goHome()">← العودة للدروس</button>
    <div class="lesson-header-icon" id="lessonIcon"></div>
    <h2 id="lessonTitleAr"></h2>
    <div class="subtitle" id="lessonTitleIt"></div>
  </div>
  <div class="chat-container" id="chatContainer"></div>
  <div class="quick-questions" id="quickQuestions"></div>
  <div class="input-bar">
    <textarea class="input-field" id="userInput" rows="1"
      placeholder="اسأل أي سؤال عن هذا الدرس..."
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let currentLesson = null;
let messages = [];
let isLoading = false;
let activeCategory = 'all';
let completedLessons = [];
try { completedLessons = JSON.parse(localStorage.getItem('ta3allam_completed') || '[]'); } catch(e){}

// ══════════════════════════════════════════
// RENDER HOME
// ══════════════════════════════════════════
function renderLessons(filter = '', category = 'all') {
  const grid = document.getElementById('lessonsGrid');
  grid.innerHTML = '';
  let shown = 0;
  LESSONS.forEach(l => {
    const matchSearch = !filter || l.ar.includes(filter) || l.it.toLowerCase().includes(filter.toLowerCase()) || l.desc.includes(filter);
    const matchCat = category === 'all' || l.category === category;
    if (!matchSearch || !matchCat) return;
    shown++;
    const done = completedLessons.includes(l.id);
    const card = document.createElement('div');
    card.className = 'lesson-card';
    card.onclick = () => openLesson(l.id);
    card.innerHTML = `
      <div class="lesson-icon" style="background:${l.bg}">${done ? '✅' : l.icon}</div>
      <div class="lesson-info">
        <div class="lesson-title-ar">${l.ar}</div>
        <div class="lesson-title-it">${l.it}</div>
        <div class="lesson-desc">${l.desc}</div>
        <span class="lesson-badge">${l.badge}</span>
      </div>
      <div class="lesson-arrow">←</div>`;
    grid.appendChild(card);
  });
  if (shown === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-muted)">لا توجد نتائج</div>';
  }
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((completedLessons.length / LESSONS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completedLessons.length} / ${LESSONS.length} درس`;
}

function filterLessons(val) { renderLessons(val, activeCategory); }
function filterCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLessons(document.querySelector('.search-input').value, cat);
}

// ══════════════════════════════════════════
// LESSON NAVIGATION
// ══════════════════════════════════════════
function openLesson(id) {
  currentLesson = LESSONS.find(l => l.id === id);
  messages = [];
  document.getElementById('lessonIcon').textContent = currentLesson.icon;
  document.getElementById('lessonTitleAr').textContent = currentLesson.ar;
  document.getElementById('lessonTitleIt').textContent = currentLesson.it;
  document.getElementById('quickQuestions').innerHTML = currentLesson.starters
    .map(s => `<button class="quick-btn" onclick="sendQuick('${s}')">${s}</button>`).join('');
  document.getElementById('chatContainer').innerHTML = '';
  document.getElementById('home').classList.remove('active');
  document.getElementById('lesson').classList.add('active');
  startLesson();
}

function goHome() {
  // Mark as completed if had a real conversation
  if (currentLesson && !completedLessons.includes(currentLesson.id) && messages.length > 2) {
    completedLessons.push(currentLesson.id);
    try { localStorage.setItem('ta3allam_completed', JSON.stringify(completedLessons)); } catch(e){}
  }
  document.getElementById('lesson').classList.remove('active');
  document.getElementById('home').classList.add('active');
  renderLessons('', activeCategory);
  currentLesson = null;
  messages = [];
}

// ══════════════════════════════════════════
// API CALLS  →  /api/chat  (Groq proxy)
// ══════════════════════════════════════════
async function callAI(msgs) {
  const resp = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: currentLesson.system,
      messages: msgs
    })
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || 'API error');
  return data.text;
}

async function startLesson() {
  isLoading = true;
  showTyping();
  try {
    const initMsg = [{ role: 'user', content: 'ابدأ الدرس' }];
    const text = await callAI(initMsg);
    removeTyping();
    messages.push({ role: 'user', content: 'ابدأ الدرس' });
    messages.push({ role: 'assistant', content: text });
    addMessage('ai', text);
  } catch(e) {
    removeTyping();
    addError('تعذّر الاتصال بالمعلم. تحقق من اتصالك.');
  }
  isLoading = false;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = ''; input.style.height = '';
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();
  try {
    const reply = await callAI(messages.slice(-10));
    removeTyping();
    messages.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);
  } catch(e) {
    removeTyping();
    addError('تعذّر الاتصال. حاول مجدداً.');
  }
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

// ══════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════
function addMessage(role, text) {
  const c = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? '🎓' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text
    .replace(/\*\*([^*]+)\*\*/g, '<span class="it-word">$1</span>')
    .replace(/\n/g, '<br>');
  div.appendChild(avatar);
  div.appendChild(bubble);
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'msg msg-ai'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">🎓</div>
    <div class="typing-indicator">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  c.appendChild(div); c.scrollTop = c.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function addError(msg) {
  const c = document.getElementById('chatContainer');
  const d = document.createElement('div');
  d.className = 'error-msg'; d.textContent = msg;
  c.appendChild(d);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Init
renderLessons();
</script>
